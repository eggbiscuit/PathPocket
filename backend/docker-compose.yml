services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pathpocket
      POSTGRES_PASSWORD: pathpocket
      POSTGRES_DB: pathpocket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathpocket"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      args:
        # Set to 1 (x86_64 only) to build in the proprietary readers.
        ENABLE_SDPC: ${ENABLE_SDPC:-0}
        ENABLE_KFB: ${ENABLE_KFB:-0}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pathpocket:pathpocket@db:5432/pathpocket
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pathpocket.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-PathPocket <no-reply@pathpocket.dev>}
      WSI_STORAGE_DIR: /data/wsi
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-paraformer-realtime-v2}
      ASR_VOCABULARY_ID: ${ASR_VOCABULARY_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - wsi_data:/data/wsi

volumes:
  pgdata:
  wsi_data:
